name: Test Community deployment
run-name: Test Community deployment 

on:
  pull_request:
    paths-ignore:
      - '**/README.md'
    types: [opened, edited, synchronize, reopened]
  push:
    branches:
      - '*-maintenance'
      - 'release-notes-*'
    paths-ignore:
      - '**/README.md'

permissions:
  pull-requests: write

jobs:
  test-deploy:
    uses: rancher/product-docs-common/.github/workflows/test-deploy-min.yml@ccf201d245dc524c72e7552d1ed0b53063b85793 # main
    secrets:
      token: ${{ github.token }}
    with:
      playbook-name: 'playbook-community-local.yml'
