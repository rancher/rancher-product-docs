name: Test deployment
run-name: Test deployment (Community)

on:
  pull_request:
    paths-ignore:
      - '**/README.md'
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  test-deploy:
    uses: rancher/product-docs-common/.github/workflows/test-deploy-min.yml@e37ee6abff600fe8b90fa8d6ad41ec23d9c4b90c # main
    secrets:
      token: ${{ github.token }}
    with:
      playbook-name: 'playbook-community-local.yml'
