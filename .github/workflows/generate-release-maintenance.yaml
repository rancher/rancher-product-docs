name: Generate Release Maintenance

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'The release tag (e.g., v2.11.10-alpha1)'
        required: true
      release_date:
        description: 'The release date (e.g., Jan 28, 2026)'
        required: true
      prime:
        description: 'Is this version available in Prime? (Default: y)'
        required: false
        default: 'y'
      community:
        description: 'Is this version available in Community? (Default: y)'
        required: false
        default: 'y'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write # Vault access
    env:
      BASE_BRANCH: 'main'
      DATE: ${{ inputs.release_date }}
      PRIME: ${{ inputs.prime }}
      COMMUNITY: ${{ inputs.community }}
      TAG: ${{ inputs.release_tag }}
      VERSION: ''
    steps:
      - name: Determine base branch
        run: |
          # Extract version from tag (e.g., v2.11.10-alpha1 -> v2.11.10)
          VERSION=${TAG%%-*}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          if git ls-remote https://github.com/rancher/rancher-product-docs "$VERSION" | grep -q "$VERSION"; then
            echo "BASE_BRANCH=$VERSION" >> $GITHUB_ENV
          fi

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.BASE_BRANCH }}

      - name: Generate Release Maintenance
        run: ./scripts/release-maintenance.sh -t "$TAG" -d "$DATE" --prime "$PRIME" --community "$COMMUNITY"

      - name: Load App Credentials from Vault
        uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # main
        with:
          secrets: |
            github/token/rancher--rancher-product-docs--contents--write token | GH_TOKEN

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
          PR_TOKEN: ${{ github.token }}
        run: |
          BRANCH_NAME="${VERSION}-maintenance"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add .
          git diff --cached --quiet || git commit -m "$VERSION - Release Maintenance"

          git remote set-url origin "https://x-access-token:${PR_TOKEN}@github.com/${{ github.repository }}.git"
          git push -f origin "$BRANCH_NAME"

          PR_NUMBER=$(GH_TOKEN="$PR_TOKEN" gh pr list --head "$BRANCH_NAME" --base "$BASE_BRANCH" --json number --jq '.[0].number')

          PR_BODY="Automated release maintenance updates for version $VERSION."$'\n'"Command executed: \`./scripts/release-maintenance.sh -t \"$TAG\" -d \"$DATE\" --prime \"$PRIME\" --community \"$COMMUNITY\"\`"

          # Search for the release maintenance issue
          IS_FORK=$(GH_TOKEN="$PR_TOKEN" gh repo view "${{ github.repository }}" --json isFork --jq '.isFork')
          if [[ "$IS_FORK" == "false" ]]; then
            ISSUE_NUMBER=$(GH_TOKEN="$PR_TOKEN" gh issue list --repo "${{ github.repository }}" --search "\"$VERSION\" \"Rancher Manager Release Maintenance Task Checklist\" in:title is:open" --json number --jq '.[0].number')
            if [[ -n "$ISSUE_NUMBER" && "$ISSUE_NUMBER" != "null" ]]; then
              PR_BODY="$PR_BODY"$'\n\n'"Relates to #$ISSUE_NUMBER"
            fi
          fi

          if [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "null" ]]; then
            GH_TOKEN="$PR_TOKEN" gh pr edit "$PR_NUMBER" \
              --title "$VERSION - Release Maintenance" \
              --body "$PR_BODY"
          else
            PR_URL=$(GH_TOKEN="$PR_TOKEN" gh pr create \
              --title "$VERSION - Release Maintenance" \
              --body "$PR_BODY" \
              --base "$BASE_BRANCH" \
              --head "$BRANCH_NAME" \
              --milestone "$VERSION")
            PR_NUMBER=${PR_URL##*/}
          fi
