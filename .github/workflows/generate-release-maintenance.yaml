name: Generate Release Maintenance

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'The release tag (e.g., v2.11.10-alpha1)'
        required: true
      release_date:
        description: 'The release date (e.g., Jan 28, 2026)'
        required: true
      prime:
        description: 'Is this version available in Prime? (Default: y)'
        required: false
        default: 'y'
      community:
        description: 'Is this version available in Community? (Default: y)'
        required: false
        default: 'y'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Release Maintenance
        run: ./release-maintenance.sh -t "${{ inputs.release_tag }}" -d "${{ inputs.release_date }}" --prime "${{ inputs.prime }}" --community "${{ inputs.community }}"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.release_tag }}
          DATE: ${{ inputs.release_date }}
          PRIME: ${{ inputs.prime }}
          COMMUNITY: ${{ inputs.community }}
        run: |
          # Extract version from tag (e.g., v2.11.10-alpha1 -> v2.11.10)
          VERSION=${TAG%%-*}
          BRANCH_NAME="${VERSION}-maintenance"

          if git ls-remote --heads origin "$VERSION" | grep -q "$VERSION"; then
            BASE_BRANCH="$VERSION"
          else
            BASE_BRANCH="main"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add .
          git commit -m "$VERSION - Release Maintenance"
          git push -f origin "$BRANCH_NAME"

          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --base "$BASE_BRANCH" --json number --jq '.[0].number')

          PR_BODY="Automated release maintenance updates for version $VERSION."$'\n'"Command executed: \`./release-maintenance.sh -t \"$TAG\" -d \"$DATE\" --prime \"$PRIME\" --community \"$COMMUNITY\"\`"

          # Search for the release maintenance issue
          IS_FORK=$(gh repo view "${{ github.repository }}" --json isFork --jq '.isFork')
          if [[ "$IS_FORK" == "false" ]]; then
            ISSUE_NUMBER=$(gh issue list --repo "${{ github.repository }}" --search "\"$VERSION\" \"Rancher Manager Release Maintenance Task Checklist\" in:title is:open" --json number --jq '.[0].number')
            if [[ -n "$ISSUE_NUMBER" && "$ISSUE_NUMBER" != "null" ]]; then
              PR_BODY="$PR_BODY"$'\n\n'"Relates to #$ISSUE_NUMBER"
            fi
          fi

          if [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "null" ]]; then
            gh pr edit "$PR_NUMBER" \
              --title "$VERSION - Release Maintenance" \
              --body "$PR_BODY"
          else
            PR_URL=$(gh pr create \
              --title "$VERSION - Release Maintenance" \
              --body "$PR_BODY" \
              --base "$BASE_BRANCH" \
              --head "$BRANCH_NAME")
            PR_NUMBER=${PR_URL##*/}
          fi

          IS_CROSS_REPO=$(gh pr view "$PR_NUMBER" --json isCrossRepository --jq '.isCrossRepository')
          if [ "$IS_CROSS_REPO" == "true" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/pulls/${PR_NUMBER}" -f maintainer_can_modify=true
          else
            echo "Skipping maintainer_can_modify patch: not a cross-repo PR."
          fi