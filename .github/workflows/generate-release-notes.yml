name: Generate and Store Release Notes

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional: the patch release version (e.g., v2.13.1)'
        required: false
        default: ''

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push to branch
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Ruby for Asciidoctor
        uses: ruby/setup-ruby@c515ec17f69368147deb311832da000dd229d338 # v1.297.0
        with:
          ruby-version: '3.4' # Or any recent version
          bundler-cache: true

      - name: Install Asciidoctor
        run: gem install asciidoctor

      - name: Install Pandoc 3.9.0.1 via direct download
        run: |
          PANDOC_VERSION="3.9.0.1"
          DEB_URL="https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          curl -sL -o pandoc.deb "${DEB_URL}"
          # Verify the checksum of the downloaded package
          echo "fbec6171aa4e96dd3c8c604e3ea30a9286cef8022397d0247c1fb64b7e5e8cee  pandoc.deb" | sha256sum -c -
          sudo dpkg -i pandoc.deb

      - name: Create release notes build directory
        run: mkdir release-notes-build

      - name: Generate Release Notes
        run: |
          # Extract and format product name attributes from playbook
          awk '
            /# product names, DO NOT EDIT THIS LINE, USED BY SCRIPT/ { flag=1; next }
            /^[ \t]*extensions:/ { flag=0 }
            flag && NF>0 { sub(/^[ \t]+/, ":"); print }
          ' playbook-community-local.yml > /tmp/attrs.adoc

          if [ -n "$VERSION" ]; then
            # Extract major.minor for directory (e.g. v2.13.1 -> v2.13)
            VERSION_DIR=$(echo "$VERSION" | cut -d. -f1,2)
            FILES="versions/$VERSION_DIR/modules/en/pages/release-notes/$VERSION.adoc"
          else
            FILES=$(find versions -type f -path "versions/*/modules/en/pages/release-notes/v*.adoc")
          fi

          for INPUT_FILE in $FILES; do
            if [ ! -f "$INPUT_FILE" ]; then
              if [ -n "$VERSION" ]; then
                echo "Error: Input file $INPUT_FILE not found."
                exit 1
              fi
              continue
            fi

            BASENAME=$(basename "$INPUT_FILE" .adoc)
            XML_FILE="release-notes-build/${BASENAME}.xml"
            MARKDOWN_FILE="release-notes-build/${BASENAME}.md"

            # Pre-process INPUT_FILE to inject product name attributes
            awk '
              NR==FNR { attrs = attrs $0 "\n"; next }
              { print }
              !d && index($0, "ifeval::[\"{build-type}\" == \"community\"]") {
                printf "%s", attrs
                d=1
              }
            ' /tmp/attrs.adoc "$INPUT_FILE" > /tmp/processed.adoc
            mv /tmp/processed.adoc "$INPUT_FILE"

            # Convert AsciiDoc to DocBook
            asciidoctor -v -a build-type=community -b docbook5 -o "$XML_FILE" "$INPUT_FILE"

            # Convert DocBook to GitHub-Flavored Markdown
            pandoc --from docbook \
                   --to gfm \
                   --wrap=none \
                   --verbose \
                   --output "$MARKDOWN_FILE" \
                   "$XML_FILE"

            # Add an extra # to each Markdown header due to a missing title
            sed -i 's/^#/##/' "$MARKDOWN_FILE"

            # Re-add title to release notes.
            # (pandoc -s renders title as metadata, so post-processing is needed anyway)
            TITLE_TEXT=$(grep -oP '(?<=<title>).*?(?=</title>)' "$XML_FILE" | head -n 1)
            sed -i "1i# ${TITLE_TEXT}\n" "$MARKDOWN_FILE"
          done

      - name: Deploy to release-notes-build branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release-notes-build
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git checkout --orphan release-notes-build
          git add .
          git commit -m "Generate Release Notes"
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git push -f origin release-notes-build
